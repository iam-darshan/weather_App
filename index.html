<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Jost:ital,wght@0,100..900;1,100..900&family=M+PLUS+Rounded+1c:wght@400;900&family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Varela+Round&display=swap');
    </style>
    

</head>

<body>
    <div class="container">
        <div class="nav">
            <div class="navBar">
                <div class="glass" id="city">city</div>
                <div class="glass" class="addBtn">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </div>
        <div class="main">
            <div class="info" id="leftInfo">
                    <div class="location">
                        <i class="fa-solid fa-location-arrow" style="font-size: ;"></i>
                        <h1 id="area">Perambra</h1>
                        <h2 id="state">Kerala</h2>
                    </div>
                    <div class="rainProb">
                        <div class="rainText">
                            <i class="fa-solid fa-droplet"></i>
                            <div>Rain Probability</div>
                        </div>
                        <h1 id="rainProbability">90%</h1>
                    </div>
            </div>
            <div class="middle">
                <div class="temp">
                    <div id="celsius">22</div>
                    <div><img src="" alt="weather" id="weatherIcon"></div>
                </div>
                <div class="condition">
                    <h4 id="conditionText">Light Rain Shower</h4>
                </div>
            </div>
            <div class="info" id="moreInfo">
                <div class="insideInfo" class="air" >
                    <i class="fas fa-cloud"></i>
                    <h4>Air Quality</h4>
                    <h3 id="airquality">1</h3>

                </div>
                <div class="insideInfo" class="wind" >
                    <i class="fas fa-wind"></i>
                    <h4>Wind</h4>
                    <h3 id="windSpeed">30KMPH</h3>
                </div>
                <div class="insideInfo" class="Humidity" class="glass">
                    <i class="fas fas fa-cloud-rain"></i>
                    <h4>Humidity</h4>
                    <h3 id="humidityVal">90</h3>

                </div>
            </div>
        </div>
    </div>

    
    <script src="https://kit.fontawesome.com/ace1db4d2c.js" crossorigin="anonymous"></script>
    <script src="script.js" defer></script>
</body>

</html>
